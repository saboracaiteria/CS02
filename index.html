<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>FPS Multiplayer Template</title>
		<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
	width: 100%;
	height: 100%;
}

body {
	color: white;
	background: #0a0a0c;
	overflow: hidden;
	touch-action: none;
	font-family: 'Inter', sans-serif;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

/* Splash Screen Premium */
#status {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	z-index: 1000;
	transition: opacity 0.5s ease-out;
}

#status-splash {
	max-width: 200px;
	margin-bottom: 2rem;
	filter: drop-shadow(0 0 20px rgba(0, 150, 255, 0.4));
	animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
	0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.2)); }
	50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.6)); }
}

/* Barra de Progresso Estilizada */
#status-progress {
	width: 300px;
	height: 8px;
	appearance: none;
	border-radius: 10px;
	overflow: hidden;
	background: rgba(255, 255, 255, 0.1);
	backdrop-filter: blur(5px);
	border: 1px solid rgba(255, 255, 255, 0.1);
}

#status-progress::-webkit-progress-bar {
	background: transparent;
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
	box-shadow: 0 0 15px #0072ff;
	transition: width 0.3s ease;
}

#status-notice {
	margin-top: 1.5rem;
	padding: 1rem 2rem;
	background: rgba(255, 71, 87, 0.1);
	border: 1px solid rgba(255, 71, 87, 0.3);
	border-radius: 8px;
	color: #ff4757;
	font-size: 0.9rem;
	display: none;
	max-width: 80%;
	text-align: center;
}

.loading-text {
	margin-bottom: 1rem;
	font-size: 0.8rem;
	letter-spacing: 0.2rem;
	text-transform: uppercase;
	color: rgba(255, 255, 255, 0.5);
	font-weight: 700;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" src="index.png" alt="Logo">
			<div class="loading-text">Iniciando Servidores...</div>
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script>
			// Desbloqueia o F12 e ferramentas de desenvolvedor
			window.addEventListener('keydown', function(e) {
				if (e.key === 'F12' || 
					(e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
					(e.ctrlKey && e.key === 'U')) {
					e.stopPropagation();
				}
			}, true);
		</script>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":36192416,"index.wasm":43016933},"focusCanvas":true,"gdextensionLibs":[]};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.style.opacity = '0';
			setTimeout(() => {
				statusOverlay.remove();
			}, 500);
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occured');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				navigator.serviceWorker.getRegistration().then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).catch((err) => {
				console.error('Error while registering service worker:', err);
			}).then(() => {
				window.location.reload();
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
